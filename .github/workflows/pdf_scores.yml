name: PDF Scores
run-name: Generate & publish PDF scores
on: [push]

jobs:
  pdf_scores:
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Retrieve repository files
        uses: actions/checkout@v6

      - name: Set up lilypond
        uses: codello/setup-lilypond@main
        with:
          lilypond-version: 2.25.32

      - name: Generate PDF scores
        run: make

      - name: Publish PDF scores
        run: make publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
